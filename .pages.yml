media:
  input: public/uploads
  output: /uploads

content:
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    filename: "{fields.id}.json"
    format: json
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: summary
        label: Summary
        type: text
      - name: status
        label: Status
        type: select
        options:
          values:
            - draft
            - published
            - archived
      - name: featured
        label: Featured
        type: boolean